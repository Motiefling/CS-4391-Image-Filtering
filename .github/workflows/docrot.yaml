name: Docrot Detector
on: [push]

jobs:
  docrot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Prefer a stable tag (for example: @v1) after release.
      - uses: SuchiiJain/CS4485_Capstone@portias-supabase-integration